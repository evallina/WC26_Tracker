name: Deploy to Pages

# Deploys the static site on every push to main (including the bot's data commits).
# Uses a controlled concurrency group so a new push cancels an in-flight deploy instead
# of colliding with it — the legacy branch build was failing intermittently with
# "Deployment failed, try again later" whenever two deploys overlapped, freezing the site.

on:
  push:
    branches: [main]              # human / gh pushes (real token) deploy directly
  workflow_run:
    workflows: ["Refresh live data"]   # the bot commits with GITHUB_TOKEN, which can't
    types: [completed]                 # trigger `push` workflows — so deploy after the
                                       # refresh workflow finishes instead
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true      # newest data wins; drop a superseded in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deploy1.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (exclude repo/CI metadata)
        run: |
          mkdir _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      # Pages' deployment API intermittently returns "Deployment failed, try again
      # later" when a prior deploy is still settling. Try once, and if it's that
      # transient error, wait for it to settle and retry — so a blip never leaves the
      # site stale until the next hourly refresh.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deploy1.outcome == 'failure'
        run: echo "First deploy failed (likely transient) — waiting to retry." && sleep 45
      - id: deployment
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
