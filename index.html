<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-snap-type:y proximity;scroll-behavior:smooth}  /* gently anchor sections to the view */
  body{background:#F5F2EC;color:#1A1814;font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"liga" 1,"kern" 1,"calt" 1;}
  @keyframes wcspin{to{transform:rotate(360deg)}}
  @keyframes wcfade{from{opacity:0}to{opacity:1}}
  .wcbar{transition:width 220ms cubic-bezier(.2,.7,.2,1)}
  .wcrow{transition:background-color 140ms ease-out}
  .wcbtn{transition:color 140ms ease-out,border-color 140ms ease-out,background-color 140ms ease-out}
  ::-webkit-scrollbar{height:11px;width:11px}
  ::-webkit-scrollbar-thumb{background:rgba(120,110,95,.35);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  /* timeline scrubber — minimal, thin track + accent thumb */
  .wc-tl{-webkit-appearance:none;appearance:none;width:100%;height:16px;background:transparent;cursor:pointer;margin:0;display:block}
  .wc-tl:disabled{cursor:default}
  .wc-tl::-webkit-slider-runnable-track{height:2px;border-radius:2px;background:var(--wc-track)}
  .wc-tl::-moz-range-track{height:2px;border-radius:2px;background:var(--wc-track)}
  .wc-tl::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;background:var(--wc-thumb);border:2px solid var(--wc-surface);box-shadow:0 1px 3px rgba(0,0,0,.28);margin-top:-6.5px;cursor:pointer;transition:background 140ms}
  .wc-tl::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--wc-thumb);border:2px solid var(--wc-surface);box-shadow:0 1px 3px rgba(0,0,0,.28);cursor:pointer}
  .wc-tl:disabled::-webkit-slider-thumb{box-shadow:none;cursor:default}
  .wc-tl:disabled::-moz-range-thumb{box-shadow:none;cursor:default}
</style>
<script src="wc-thirds.js"></script>
<script src="wc-data.js"></script>
<script src="wc-engine.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js"></script>
</helmet>
<div style="{{ rootStyle }}">
  <header style="{{ headerStyle }}">
    <div style="display:flex;align-items:baseline;gap:14px;min-width:0">
      <div style="font-weight:800;font-size:16px;letter-spacing:-0.01em;white-space:nowrap">FIFA World Cup <span style="font-weight:300">2026</span></div>
      <div style="font-size:11px;letter-spacing:0.22em;text-transform:uppercase;opacity:0.5;white-space:nowrap" data-screen-label="masthead">{{ tagline }}</div>
    </div>
    {{ controls }}
  </header>
  {{ app }}
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:840}}">
class Component extends DCLogic {
  constructor(p){
    super(p);
    let tz = 'UTC';
    try { tz = Intl.DateTimeFormat().resolvedOptions().timeZone; } catch(e){}
    this.state = {
      loaded:false, computing:false, data:null, standings:null, clinch:{}, sim:null, thirds:[],
      theme:'light', accent:'#42D674', lang:'en',
      highlights:[], hoverTeam:null, selectedTeam:null,
      menu:null, menuAnchor:null, teamMenu:null, showBest3:false,
      winW:(typeof window!=='undefined'&&window.innerWidth)||1280, mobileMenu:false,
      convertTz:false, tzTarget:tz, autoTz:tz,
      youPlay:false, picks:{}, themeBeforePlay:null,
      timeline:false, tlIso:null,
      debug:false, dbg:{ field:14, normalH:7, between:18, thick:1, selH:31, selW:4.5, rowH:162, cardV:0, scale:1,
        tlTop:12, tlBot:16, lblTop:0, lblBot:0, tlScale:0.65, tlTitleGap:6, tlLen:1600, tlBtn:26, colGap:116,
        tsTeam:18, tsSub:11, tsDetail:14, tsScore:17, tsSmall:1, snapTop:72, gsText:0.85, embTop:250, embScale:1,
        chTop:128, chScale:1.35 },
      dbgPos:null,
      refreshing:false, lastUpdated:null,
      source:'demo', generatedAt:null, koReal:{}, koByTeam:{},
      autoRefresh:true,
      vsY:{}, cardGeom:{}, bkW:null, bkSide:'L',
    };
  }
  // Measure each large card's "vs." divider so connectors exit at that exact line.
  // Coordinates are divided by the current bracket scale (the bracket is transform-
  // scaled to fit), so the unscaled SVG connector space stays correct.
  measureVs(){
    if(this.state.youPlay){
      const ns = {};
      if(this.state.vsY && Object.keys(this.state.vsY).length) ns.vsY = {};
      if(this.state.cardGeom && Object.keys(this.state.cardGeom).length) ns.cardGeom = {};
      if(Object.keys(ns).length) this.setState(ns);
      return;
    }
    const cont = document.getElementById('wc-bk-inner');
    if(!cont) return;
    const s = this._bkScale || 1;
    const cr = cont.getBoundingClientRect();
    const prev = this.state.vsY || {};
    const map = {}; let changed = false;
    cont.querySelectorAll('.wc-vsline').forEach(el=>{
      const r = el.getBoundingClientRect();
      const slot = el.getAttribute('data-slot');
      map[slot] = (r.top - cr.top + r.height/2)/s;
      if(Math.abs((prev[slot]==null?-99999:prev[slot]) - map[slot]) > 0.5) changed = true;
    });
    if(Object.keys(map).length !== Object.keys(prev).length) changed = true;
    // per-large-card box + its vs-line offset, so the card border can break exactly
    // where the connector leaves (at the vs-line), in the card's own unscaled space.
    const pg = this.state.cardGeom || {};
    const geom = {}; let gChanged = false;
    cont.querySelectorAll('.wc-bigcard').forEach(el=>{
      const slot = el.getAttribute('data-card'); const vs = el.querySelector('.wc-vsline');
      if(!vs) return;
      const br = el.getBoundingClientRect(), vr = vs.getBoundingClientRect();
      const g = { w:br.width/s, h:br.height/s, vy:(vr.top + vr.height/2 - br.top)/s, side:el.getAttribute('data-side') };
      geom[slot] = g; const p = pg[slot];
      if(!p || Math.abs(p.w-g.w)>0.5 || Math.abs(p.h-g.h)>0.5 || Math.abs(p.vy-g.vy)>0.5 || p.side!==g.side) gChanged = true;
    });
    if(Object.keys(geom).length !== Object.keys(pg).length) gChanged = true;
    const ns = {};
    if(changed) ns.vsY = map;
    if(gChanged) ns.cardGeom = geom;
    if(Object.keys(ns).length) this.setState(ns);
  }
  // Available width for the bracket → drives the fit-to-width scale + narrow mode.
  measureBracket(){
    const el = document.getElementById('wc-bk-outer');
    if(!el) return;
    const w = el.clientWidth;
    if(w && Math.abs((this.state.bkW||0) - w) > 1) this.setState({bkW:w});
  }
  remeasure(){ requestAnimationFrame(()=>{ this.measureBracket(); this.measureVs(); }); }
  componentDidMount(){
    const wait = ()=>{
      if(window.WC && window.WCEngine){ this.load(true); }
      else setTimeout(wait, 60);
    };
    wait();
    this._onDocClick = (e)=>{
      if(this.state.menu && !e.target.closest('[data-wc-menu]') && !e.target.closest('[data-wc-menubtn]')) this.setState({menu:null});
    };
    document.addEventListener('click', this._onDocClick);
    this._onResize = ()=>{ this.remeasure(); const w=window.innerWidth||0; if(w!==this.state.winW) this.setState({winW:w}); };
    window.addEventListener('resize', this._onResize);
    setTimeout(()=>this.remeasure(), 500);
    // refresh as soon as the tab becomes visible again, then resume polling
    this._onVis = ()=>{ if(!document.hidden){ this.schedulePoll(2000); } };
    document.addEventListener('visibilitychange', this._onVis);
    this.schedulePoll();
    // debug panel: type "debug" anywhere, or call wcDebug() in the console
    window.wcDebug = ()=>this.setState({debug:!this.state.debug});
    this._dbgBuf = '';
    this._onKey = (e)=>{ if(e.target && /input|textarea|select/i.test(e.target.tagName)) return;
      this._dbgBuf = (this._dbgBuf + (e.key||'')).slice(-5).toLowerCase();
      if(this._dbgBuf==='debug'){ this._dbgBuf=''; this.setState({debug:!this.state.debug}); } };
    document.addEventListener('keydown', this._onKey);
    this.applyScrollPad();
  }
  // Offset where scroll-snap / anchor scrolling lands section tops, so they clear the
  // sticky header. scroll-padding-top on the scroll root is the reliable mechanism here
  // (per-target scroll-margin under `proximity` snapping was inconsistent).
  applyScrollPad(){
    const v = (this.state.dbg && this.state.dbg.snapTop!=null) ? this.state.dbg.snapTop : 60;
    try { document.documentElement.style.scrollPaddingTop = v+'px'; } catch(e){}
  }
  componentDidUpdate(){ this.remeasure(); this.applyScrollPad(); }
  componentWillUnmount(){
    document.removeEventListener('click', this._onDocClick);
    window.removeEventListener('resize', this._onResize);
    document.removeEventListener('visibilitychange', this._onVis);
    document.removeEventListener('keydown', this._onKey);
    clearTimeout(this._pollTimer);
  }
  /* ---------- auto-refresh polling ---------- */
  // The SERVER keeps wc-live.json fresh on its own timer; the client just re-reads it
  // (cheap, local, can't hang). Cadence is short because re-reading a file is light.
  nextPollDelay(){
    const S = this.state;
    if(!S.data) return 30000;
    const live = (S.data.knockoutFixtures||[]).some(k=>k.status==='live')
      || (S.data.groupMatches||[]).some(m=>m.status==='live');
    if(live) return 15000;                                   // 15s during live play
    const now = Date.now();
    const near = Object.values(S.koSched||{}).some(t=>{ const d=new Date(t).getTime()-now; return d>-3*3600000 && d<40*60000; });
    return near ? 25000 : 45000;                             // 25s near a kickoff, else 45s
  }
  schedulePoll(delay){
    clearTimeout(this._pollTimer);
    this._pollTimer = setTimeout(()=>this.poll(), delay!=null?delay:this.nextPollDelay());
  }
  poll(){
    // self-heal: never let a stuck refresh flag freeze polling
    if(this.state.refreshing && this._refreshAt && Date.now()-this._refreshAt > 20000){
      this.setState({refreshing:false});
    }
    if(!document.hidden && this.state.loaded && this.state.autoRefresh && !this.state.refreshing){
      this.load(false);     // re-read the snapshot the server keeps fresh
    }
    this.schedulePoll();
  }

  load(initial){
    this._refreshAt = Date.now();
    this.setState({ computing:initial, refreshing:!initial });
    setTimeout(async ()=>{
      let data;
      try { data = await window.WC.fetchTournamentState(); }
      catch(e){ console.error('[WC] adapter failed', e); this.setState({computing:false, refreshing:false}); this.schedulePoll(); return; }
      // nothing changed since last load → skip the heavy recompute, just keep polling
      if(!initial && data.generatedAt && data.generatedAt === this.state.generatedAt){
        this.setState({ computing:false, refreshing:false });
        this.schedulePoll();
        return;
      }
      const standings = window.WCEngine.allStandings(data.groupMatches);
      const clinch = {};
      window.WC.GROUPS.forEach(g=>{ clinch[g] = window.WCEngine.clinchStatus(g, data.groupMatches); });
      const thirds = window.WCEngine.rankThirds(standings);
      const sim = window.WCEngine.simulate(data.groupMatches, data.knockout, window.WC.simulation.runs);
      // index real knockout fixtures: by team-pair (exact) AND by each team (anchor),
      // so a result can be found even if our predicted opponent differs from reality.
      const koReal = {}, koByTeam = {};
      (data.knockoutFixtures||[]).forEach(k=>{
        if(!k.home || !k.away) return;
        koReal[k.round+'|'+[k.home,k.away].sort().join('-')] = k;
        koByTeam[k.round+'|'+k.home] = k;
        koByTeam[k.round+'|'+k.away] = k;
      });
      // map each knockout slot → its real scheduled kickoff (round's times sorted by
      // utcDate ↔ slots sorted by match number), so every round shows a real time.
      const koSched = {};
      const sched = data.koByRound || {};
      ['R32','R16','QF','SF','F','TP'].forEach(round=>{
        const arr = sched[round]; if(!arr || !arr.length) return;
        const slots = data.knockout.filter(k=>k.round===round).sort((a,b)=>a.matchNo-b.matchNo);
        slots.forEach((k,i)=>{ if(arr[i]) koSched[k.slot] = arr[i]; });
      });
      // group stage fully decided? → bracket flips to its clean post-32 state (§6.4)
      const groupDone = data.groupMatches.every(m=>m.status==='final');
      const now = new Date();
      this.setState({ loaded:true, computing:false, refreshing:false, data, standings, clinch, thirds, sim,
        koReal, koByTeam, koSched, groupDone, source:data.source, generatedAt:data.generatedAt, lastUpdated: now });
      this.schedulePoll();   // re-arm polling at the cadence implied by the fresh data
    }, initial ? 30 : 260);
  }
  // Manual Refresh. Only the local dev server (tools/serve.mjs) exposes /api/refresh to
  // force a fresh pull; on a static host (GitHub Pages) there is no backend, so we skip
  // the doomed request entirely and just re-read ./wc-live.json — which the scheduled
  // GitHub Action keeps fresh. Timeout-guarded so nothing can freeze the button.
  refreshLive(){
    if(this.state.refreshing) return;
    this._refreshAt = Date.now();
    this.setState({refreshing:true});
    const finish = ()=>this.load(false);   // re-read the committed snapshot
    const local = location.hostname==='localhost' || location.hostname==='127.0.0.1';
    if(!local){ finish(); return; }         // static host → no /api, just reload the snapshot
    let done = false;
    const once = ()=>{ if(done) return; done = true; finish(); };
    const t = setTimeout(once, 9000);
    fetch('/api/refresh',{cache:'no-store'}).then(r=>r.ok?r.json():null).catch(()=>null)
      .then(()=>{ clearTimeout(t); once(); });
  }
  // real knockout result for a resolved matchup, if one exists (live or final)
  realKO(round, a, b){
    if(!a || !b) return null;
    return this.state.koReal[round+'|'+[a,b].sort().join('-')] || null;
  }
  // best kickoff instant for a knockout slot: the drawn fixture's real time, else
  // the round's real scheduled time, else the encoded official time.
  koInst(m, real){
    return (real && real.kickoffUTC) || (this.state.koSched && this.state.koSched[m.slot]) || m.kickoffUTC || null;
  }
  // the team a feeder resolves to ONLY if it's certain (group winner/runner-up, or a
  // confirmed prior-round winner) — used as a reliable anchor; null for a best-third.
  certainTeam(feeder){
    if(feeder.type==='groupWinner' || feeder.type==='groupRunnerUp') return this.resolveTeam(feeder);
    if(feeder.type==='matchWinner'){
      const fm = this.state.data.knockout.find(k=>k.slot===feeder.ref); if(!fm) return null;
      const r = this.koFixtureFor(fm);
      return (r && r.status==='final' && r.winnerId) ? r.winnerId : null;
    }
    return null;
  }
  // Find the real feed fixture for a slot — by exact pair, else by a certain anchor
  // team (so a best-third misprediction can't hide a played result).
  koFixtureFor(m){
    const a=this.resolveTeam(m.homeFeeder), b=this.resolveTeam(m.awayFeeder);
    const exact = this.realKO(m.round, a, b);
    if(exact) return exact;
    const T = this.state.koByTeam || {};
    const cH = this.certainTeam(m.homeFeeder), cA = this.certainTeam(m.awayFeeder);
    for(const t of [cH, cA]){ if(t && T[m.round+'|'+t]) return T[m.round+'|'+t]; }
    return null;
  }
  // Resolve a slot to {real, sideA, sideB}: when a feed fixture exists, the feed's
  // teams are ground truth, mapped to (home,away) sides via the certain anchor so the
  // sub-labels stay correct even if the feed's home/away order differs.
  slotMatch(m){
    const real = this.koFixtureFor(m);
    const aId=this.resolveTeam(m.homeFeeder), bId=this.resolveTeam(m.awayFeeder);
    if(!real) return {real:null, sideA:aId, sideB:bId};
    const feed=[real.home, real.away];
    const cH=this.certainTeam(m.homeFeeder), cA=this.certainTeam(m.awayFeeder);
    let sideA, sideB;
    if(cH && feed.includes(cH)){ sideA=cH; sideB=feed.find(t=>t!==cH); }
    else if(cA && feed.includes(cA)){ sideB=cA; sideA=feed.find(t=>t!==cA); }
    else { sideA=real.home; sideB=real.away; }
    return {real, sideA, sideB};
  }

  /* ---------- i18n ---------- */
  get T(){
    const en = { highlight:'Highlight a team', maxN:'8 max', groups:'Groups', bracket:'Bracket',
      best3:'Best 3rd-placed teams', clinched:'Clinched', vs:'vs.', convert:'Convert times',
      timezone:'Time zone', official:'Official local time', officialTimes:'Official Times', myTime:'My time', language:'Language', refresh:'Refresh',
      screenshot:'Screenshot', light:'Light', dark:'Dark', updated:'Updated', yourPred:'Your prediction',
      goBack:'Go back', tapAdvance:'Tap a side to pick the winner — build your bracket to the final',
      winner:g=>`Group ${g} winner`, runnerUp:g=>`Group ${g} runner-up`,
      thirdFrom:gs=>`3rd from Groups ${gs}`, squad:'Squad', staff:'Coaching staff',
      played:'Played', record:'W / D / L', gf:'Goals for', ga:'Goals against', gd:'Goal difference',
      yc:'Yellow', rc:'Red', rounds:{R32:'Round of 32',R16:'Round of 16',QF:'Quarter-finals',SF:'Semi-finals',F:'Final',TP:'Third place'},
      pos:['Goalkeepers','Defenders','Midfielders','Attackers'], appsL:'Apps', minsL:'Mins',
      thirdPlace:'3rd-place', pts:'Pts', noQual:'Eliminated', tagline:'Knockout Tracker & Predictor' };
    const es = { highlight:'Destacar un equipo', maxN:'máx. 8', groups:'Grupos', bracket:'Cuadro', tagline:'Seguidor y Pronóstico de Eliminatorias',
      best3:'Mejores terceros', clinched:'Clasificado', vs:'vs.', convert:'Convertir horas',
      timezone:'Zona horaria', official:'Hora local oficial', officialTimes:'Horas oficiales', myTime:'Mi zona', language:'Idioma', refresh:'Actualizar',
      screenshot:'Captura', light:'Claro', dark:'Oscuro', updated:'Actualizado', yourPred:'Tu pronóstico',
      goBack:'Volver', tapAdvance:'Toca un lado para elegir al ganador — completa tu llave hasta la final',
      winner:g=>`1.º Grupo ${g}`, runnerUp:g=>`2.º Grupo ${g}`,
      thirdFrom:gs=>`3.º de los Grupos ${gs}`, squad:'Plantel', staff:'Cuerpo técnico',
      played:'Jugados', record:'G / E / P', gf:'Goles a favor', ga:'Goles en contra', gd:'Diferencia',
      yc:'Amarillas', rc:'Rojas', rounds:{R32:'Dieciseisavos',R16:'Octavos',QF:'Cuartos',SF:'Semifinales',F:'Final',TP:'Tercer puesto'},
      pos:['Porteros','Defensas','Mediocampistas','Delanteros'], appsL:'PJ', minsL:'Min',
      thirdPlace:'Tercer puesto', pts:'Pts', noQual:'Eliminado' };
    return this.state.lang==='es' ? es : en;
  }
  nm(team){ return this.state.lang==='es' ? team.nameEs : team.name; }

  /* ---------- colors ---------- */
  rgba(hex,a){ const h=hex.replace('#',''); const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
  C(){
    const light = this.state.theme!=='dark';
    // dark theme uses a cool, slightly blue-grey undertone (not warm brown)
    const surface = light?'#F5F2EC':'#0F1217';
    const fg = light?'#1A1814':'#E9EDF3';
    const a = this.state.accent;
    return { light, surface, fg, accent:a, gold:'#C2A14D',
      rule:this.rgba(fg, light?0.16:0.18), faint:this.rgba(fg,0.5), faint2:this.rgba(fg,0.34),
      zone1:this.rgba(a,light?0.13:0.18), zone2:this.rgba(a,light?0.06:0.09),
      track:this.rgba(fg,light?0.09:0.14), panel:light?'#FBF9F4':'#161B22',
      cardLine:this.rgba(fg,light?0.12:0.16) };
  }

  /* ---------- time ---------- */
  // format an absolute instant as time-of-day in the venue's zone (or the target zone)
  fmtTimeAt(kickoffUTC, venueTz){
    if(!kickoffUTC) return '';
    const tz = this.state.convertTz ? this.state.tzTarget : (venueTz||'UTC');
    try {
      // 24-hour clock (no AM/PM). en-GB gives clean 24h digits but renders zones as a
      // generic "GMT+7"; en-US gives the real abbreviation (PDT/EDT…), so append that.
      const d = new Date(kickoffUTC);
      const time = new Intl.DateTimeFormat(this.state.lang==='es'?'es':'en-GB',
        {hour:'2-digit',minute:'2-digit',hour12:false,timeZone:tz}).format(d);
      const abbr = this.tzAbbr(tz, d);
      return abbr ? `${time} ${abbr}` : time;
    } catch(e){ return ''; }
  }
  fmtTime(m){ return m ? this.fmtTimeAt(m.kickoffUTC, m.venueTz) : ''; }
  // how a finished knockout match was decided: null (regular), "AET". Penalty shootouts
  // show their result inline as the (n) suffix on each score tile, so no tag is emitted.
  koTag(real){
    if(!real || !real.duration || real.duration==='REGULAR' || (real.status!=='final' && real.status!=='live')) return null;
    const es = this.state.lang==='es';
    if(real.duration==='PENALTY_SHOOTOUT') return null;
    if(real.duration==='EXTRA_TIME') return es?'PRÓRROGA':'AET';
    return null;
  }
  // a score as a split-flap / flip-board tile: dark tile, heavy white digit, with a
  // horizontal seam across the middle (the flap hinge) cutting through the number.
  scoreBox(C, n, opts={}){
    const h = React.createElement;
    const fs = opts.size || (opts.big?23:17);
    const hgt = Math.round(fs*1.72), minW = Math.round(fs*1.2);
    return h('span',{style:{ position:'relative', display:'inline-flex', alignItems:'center', justifyContent:'center',
      minWidth:minW, height:hgt, padding:'0 6px', borderRadius:5, overflow:'hidden',
      background:'#141414', color:'#fafafa', fontWeight:800, letterSpacing:'-0.02em',
      fontSize:fs, lineHeight:1, fontVariantNumeric:'tabular-nums', flex:'0 0 auto',
      boxShadow:'inset 0 0 0 1px rgba(255,255,255,0.07), 0 1px 2px rgba(0,0,0,0.35)' }},
      // stretch the digit vertically so it fills the tile like a real flip-board flap
      h('span',{style:{position:'relative', zIndex:1, display:'block',
        transform:'scaleY(1.15) scaleX(1.2) translateY(-0.4px)', transformOrigin:'center'}}, n),
      // the hinge seam: a dark line at mid-height with a faint highlight under it
      h('span',{style:{position:'absolute', left:0, right:0, top:'50%', height:2, marginTop:-1, zIndex:2,
        background:'#000', boxShadow:'0 1px 0 rgba(255,255,255,0.06)'}}));
  }
  // Rounded border for a large match card, drawn as an SVG path that BREAKS on the
  // connector edge (right for a left-half card, left for a right-half card) exactly at
  // the vs-line — so the bracket line appears to emerge from the gap. Uses the card's
  // own measured geometry (g.w/g.h/g.vy, unscaled), so it tracks the ancestor transform.
  cardBorder(C, g, gapSide, color){
    const h = React.createElement;

  resolveIn(picks, feeder){
    const S = this.state;
    if(feeder.type==='groupWinner') return S.standings[feeder.ref][0].id;
    if(feeder.type==='groupRunnerUp') return S.standings[feeder.ref][1].id;
    if(feeder.type==='bestThird'){ const c = S.sim.slotContenders[feeder.ref]; return c&&c[0]?c[0].id:null; }
    if(feeder.type==='matchWinner'){
      const m = S.data.knockout.find(k=>k.slot===feeder.ref);
      if(!m) return null;
      if(picks[m.slot]) return picks[m.slot];
      const a = this.resolveIn(picks, m.homeFeeder), b = this.resolveIn(picks, m.awayFeeder);
      if(!a || !b) return null;
      let real = this.realKO(m.round, a, b);
      if(!real){   // anchor on a deterministic (group winner/runner-up) side
        const T = this.state.koByTeam || {};
        const det=(f,t)=> ((f.type==='groupWinner'||f.type==='groupRunnerUp') && t) ? T[m.round+'|'+t] : null;
        real = det(m.homeFeeder,a) || det(m.awayFeeder,b) || null;

      if(real && real.status==='final' && real.winnerId) return real.winnerId;
      return null;

    if(feeder.type==='matchLoser'){   // the 3rd-place game: losers of the two semis

      if(!m) return null;
      const a = this.resolveIn(picks, m.homeFeeder), b = this.resolveIn(picks, m.awayFeeder);

      let win = picks[m.slot];

  /* ---------- TIMELINE ---------- */
  // every calendar day from the first knockout match to the final (incl. empty days)
  tlData(){
    const ko = (this.state.data && this.state.data.knockout) || [];
    const isos = ko.map(m=>m.date && m.date.iso).filter(Boolean);
    if(!isos.length) return [];
    const num = (iso)=>{ const [m,d]=iso.split('-').map(Number); return m*100+d; };
    const matchSet = new Set(isos);
    const sorted = [...new Set(isos)].sort((a,b)=>num(a)-num(b));
    const dim = {6:30,7:31};   // tournament spans June–July 2026
    let [mm,dd] = sorted[0].split('-').map(Number);
    const [xM,xD] = sorted[sorted.length-1].split('-').map(Number);
    const days = [];
    while(mm<xM || (mm===xM && dd<=xD)){
      const iso = `${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      days.push({ iso, md:`${String(mm).padStart(2,'0')}/${String(dd).padStart(2,'0')}`, hasMatch:matchSet.has(iso) });
      dd++; if(dd>(dim[mm]||31)){ dd=1; mm++; }
    }
    return days;
  }
  tlSelectedIso(days){
    const isos = days.map(d=>d.iso);
    if(this.state.tlIso && isos.includes(this.state.tlIso)) return this.state.tlIso;
    const now = new Date();
    const today = `${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const num = (iso)=>{ const [m,d]=iso.split('-').map(Number); return m*100+d; };
    const tn = num(today);
    if(tn <= num(isos[0])) return isos[0];
    if(tn >= num(isos[isos.length-1])) return isos[isos.length-1];
    let best = isos[0]; isos.forEach(iso=>{ if(num(iso)<=tn) best=iso; });   // nearest day ≤ today
    return best;
  }
  toggleTimeline(days){
    const on = !this.state.timeline;
    this.setState({ timeline:on, tlIso: on ? this.tlSelectedIso(days) : this.state.tlIso });
  }
  // is this match on the timeline's selected day? (drives the accent highlight)
  tlMatch(m){ return !!(this._tlOn && m && m.date && m.date.iso === this._tlSelIso); }
  // set the selected day from a pointer x within the track element
  tlDrag(track, days, clientX){
    const n=days.length, r=track.getBoundingClientRect();
    const f=Math.max(0, Math.min(1, (clientX-r.left)/r.width));
    const iso=days[Math.round(f*(n-1))].iso;
    if(iso!==this.state.tlIso) this.setState({tlIso:iso});
  }
  tlDragStart(e, days){
    if(!this.state.timeline) return;
    const track=e.currentTarget;
    const getX=(ev)=>(ev.touches&&ev.touches[0])?ev.touches[0].clientX:ev.clientX;
    this.tlDrag(track, days, getX(e));
    const move=(ev)=>{ if(ev.cancelable) ev.preventDefault(); this.tlDrag(track, days, getX(ev)); };
    const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up);
      document.removeEventListener('touchmove',move); document.removeEventListener('touchend',up); };
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',up);
  }
  renderTimeline(C, days){
    const h = React.createElement, S = this.state, D = S.dbg;
    if(!days || days.length<2) return null;
    const n = days.length, on = S.timeline;
    const sel = Math.max(0, days.findIndex(d=>d.iso===this.tlSelectedIso(days)));
    const cur = days[sel], es = S.lang==='es', dim = on ? 1 : 0.4;
    const between = Math.max(0, D.between|0);
    const bs = D.tlBtn || 26;            // ON/OFF button diameter (debug-tunable)
    const tlLen = D.tlLen || 940;        // overall timeline length (max width)
    // build the barcode: a thick line per day + `between` thin lines in each gap
    const lines = [];
    for(let i=0;i<n;i++){
      lines.push({ frac:i/(n-1), day:true, dayIdx:i });
      if(i<n-1) for(let k=1;k<=between;k++) lines.push({ frac:(i + k/(between+1))/(n-1), day:false, dayIdx:-1 });
    }
    const selLineIdx = lines.findIndex(l=>l.day && l.dayIdx===sel);

  // a knockout round is complete when all its matches are final (real result)
  roundComplete(round){
    const slots = this.state.data.knockout.filter(k=>k.round===round);
    if(!slots.length) return false;
    return slots.every(k=>{
      const r=this.koFixtureFor(k);
      return r && r.status==='final' && r.winnerId;
    });
  }
  // Two adjacent rounds render LARGE: the active round (earliest not finished) and
  // the next one. As a round finishes it collapses to SMALL and the following round
  // expands. (R32+R16 now → finish R32 → R16+QF → finish R16 → QF+SF → …)
  bracketFormats(){
    const order=['R32','R16','QF','SF','F'];
    let active=order.findIndex(r=>!this.roundComplete(r));
    if(active<0) active=order.length-1;            // tournament over → keep final large
    const fmt={};
    order.forEach((r,i)=> fmt[r]= (i===active||i===active+1)?'large':'small');
    fmt.TP='small';
    return fmt;
  }
  bracketGeom(fmt){
    const rowH=this.state.dbg.rowH, topPad=30, GAP=this.state.dbg.colGap, WL=250, WS=152;
    const w=(r)=> (fmt && fmt[r]==='large') ? WL : WS;
    const order=['R32','R16','QF','SF'];
    const xL={}; let x=0;
    order.forEach(r=>{ xL[r]=x; x += w(r)+GAP; });
    const xFinal=x, wF=w('F');
    const centerX = xFinal + wF/2;
    const rx=(lx,ww)=> 2*centerX - lx - ww;
    const cols={};
    order.forEach(r=> cols[r]={L:xL[r], R:rx(xL[r],w(r)), w:w(r)});
    cols.F={x:xFinal, w:wF};
    const r32Y=i=>topPad+rowH*(i+0.5);
    const finalY=topPad+rowH*4;
    const width = cols.R32.R + cols.R32.w;
    const height = topPad*2 + 8*rowH;
    return {rowH,topPad,WL,WS,cols,centerX,r32Y,finalY,width,height};
  }

    const homeOk = !!real || this.sideSettled(m.homeFeeder);   // this side's team is confirmed
    const awayOk = !!real || this.sideSettled(m.awayFeeder);
    const settled = homeOk || awayOk;                          // show as soon as one side qualifies
    if(settled){
      const scored  = real && real.status!=='scheduled' && real.homeGoals!=null;
      const live    = real && real.status==='live';
      const decided = real && real.status==='final' && real.winnerId;
      const inst = this.koInst(m, real);
      const tStr = this.fmtTimeAt(inst, m.venueTz);
      const dStr = inst ? this.fmtDayAt(inst, m.venueTz) : this.fmtMonthDay(m.date.iso);
      const tbd = this.state.lang==='es'?'Por definir':'TBD';
      const row=(id, ok, win)=>{ const tm=(ok&&id)?window.WC.byId[id]:null; const col=tm?this.hlColor(id):null;
        const g = (scored&&tm) ? (id===real.home?real.homeGoals:real.awayGoals) : null;
        return h('div',{onClick: tm?(e)=>{e.stopPropagation();this.openTeamMenu(id, e);}:undefined,
          style:{display:'flex',alignItems:'center',gap:8,cursor:tm?'pointer':'default',padding:'4px 2px',
            opacity: decided&&!win?0.45:1}},
          h('div',{style:Object.assign({display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0},
            col?{border:`2px solid ${this.vivid(col)}`,borderRadius:9,padding:'1px 6px 1px 3px',margin:'-2px 0'}:{})},
            tm?this.flagToken(C,tm,20,{gold:tm.isWorldCupWinner}):h('span',{style:{width:20,height:20,borderRadius:'50%',flex:'0 0 auto',border:`1px dashed ${C.rule}`}}),
            h('span',{style:{flex:1,minWidth:0,fontSize:(isFinal?14.5:13)*sm,fontWeight:win?700:500,color:tm?C.fg:C.faint2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, tm?this.nm(tm):tbd)),
          (scored&&tm)?this.scoreCell(C,g,{size:(isFinal?20:14)*sm},real,id):null);
      };
      const tl = this.tlMatch(m);
      return h('div',{style:{background: tl?this.rgba(C.accent,S.theme==='dark'?0.12:0.07):C.panel,
        border:`1px solid ${tl?C.accent:(isFinal?C.gold:(live?C.accent:C.cardLine))}`,borderRadius:10,
        padding:'7px 9px', boxShadow: tl?`0 0 0 2px ${this.rgba(C.accent,0.25)}`:(isFinal?`0 0 0 1px ${C.gold}`:'none')}},
        h('div',{style:{marginBottom:6,paddingBottom:6,borderBottom:`1px solid ${C.rule}`}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:6}},
            h('span',{style:{fontWeight:700,fontSize:12*sm,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, this.cityAbbr(m.city)),
            h('span',{style:{fontSize:9.5*sm,color:C.faint2,whiteSpace:'nowrap',letterSpacing:'0.04em'}}, 'M'+m.matchNo)),
          h('div',{style:{marginTop:2}},
            live?h('span',{style:{fontSize:10*sm,color:C.accent,fontWeight:700,letterSpacing:'0.04em'}},'● '+(real.minute?real.minute+"'":'LIVE'))
              :h('span',{style:{fontSize:10*sm,color:C.faint2}}, dStr+(tStr?' · '+tStr:'')))),
        row(sideA, homeOk, real&&real.winnerId===sideA),
        row(sideB, awayOk, real&&real.winnerId===sideB),
        this.koTag(real)?h('div',{style:{marginTop:5,fontSize:8.5*sm,letterSpacing:'0.14em',textTransform:'uppercase',color:C.faint2,textAlign:'right'}},'['+this.koTag(real)+']'):null);
    }
    const pInst = this.koInst(m, null);
    const ptl = this.tlMatch(m);
    return h('div',{style:{background: ptl?this.rgba(C.accent,S.theme==='dark'?0.12:0.07):C.panel,
      border:`1px solid ${ptl?C.accent:(isFinal?C.gold:C.cardLine)}`,borderRadius:10,
      boxShadow: ptl?`0 0 0 2px ${this.rgba(C.accent,0.25)}`:'none',
      padding:isFinal?'12px 10px':'9px 10px',textAlign:'center'}},
      h('div',{style:{fontWeight:700,fontSize:(isFinal?15:13.5)*sm,letterSpacing:'-0.01em'}}, this.cityAbbr(m.city)),
      h('div',{style:{fontSize:11.5*sm,color:C.faint,marginTop:2}}, pInst?this.fmtDayAt(pInst,m.venueTz):this.fmtMonthDay(m.date.iso)),
      h('div',{style:{fontSize:10.5*sm,color:C.faint2,marginTop:1,letterSpacing:'0.02em'}}, this.fmtTimeAt(pInst, m.venueTz)),
      h('div',{style:{fontSize:10*sm,color:C.faint2,marginTop:5,letterSpacing:'0.04em'}}, 'Match '+m.matchNo));
  }

  renderYouPlayBar(C){
    const h = React.createElement, T = this.T, S = this.state;
    const picks = Object.keys(S.picks).length;
    return h('div',{style:{position:'fixed',top:0,left:0,right:0,zIndex:70,
      display:'flex',alignItems:'center',justifyContent:'space-between',gap:16,
      padding:'12px 26px',background:C.fg,color:C.surface,animation:'wcfade .18s ease-out'}},
      h('div',{style:{display:'flex',alignItems:'baseline',gap:16,minWidth:0}},
        h('span',{style:{fontSize:11,letterSpacing:'0.2em',textTransform:'uppercase',fontWeight:600,color:C.accent}},`[${T.yourPred}]`),
        h('span',{style:{fontSize:13,opacity:0.7,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, T.tapAdvance)),
      h('div',{style:{display:'flex',alignItems:'center',gap:10,flex:'0 0 auto'}},
        h('button',{onClick:()=>this.clearPicks(),className:'wcbtn',disabled:!picks,
          title:S.lang==='es'?'Borrar todo':'Clear all picks',
          style:{display:'inline-flex',alignItems:'center',gap:7,font:'inherit',fontSize:13,
            cursor:picks?'pointer':'default',padding:'8px 14px',borderRadius:9,opacity:picks?1:0.4,
            border:`1px solid ${this.rgba(C.surface,0.4)}`,background:'transparent',color:C.surface}},
          h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
            h('polyline',{points:'3 6 5 6 21 6'}),
            h('path',{d:'M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6'}),
            h('path',{d:'M10 11v6'}), h('path',{d:'M14 11v6'}),
            h('path',{d:'M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2'})),
          S.lang==='es'?'Borrar':'Clear'),
        h('button',{onClick:()=>this.exitYouPlay(),className:'wcbtn',
          style:{font:'inherit',fontSize:13,cursor:'pointer',padding:'8px 16px',borderRadius:9,
            border:`1px solid ${this.rgba(C.surface,0.4)}`,background:'transparent',color:C.surface}}, '← '+T.goBack)));
  }

  /* ---------- TEAM MODAL ---------- */
  teamStats(id){
    const S = this.state; const tm = window.WC.byId[id];
    const r = S.standings[tm.group].find(x=>x.id===id);
    const squad = window.WCEngine.squadFor(id, r.P, S.data.squads);
    let yc=0, rc=0; squad.players.forEach(p=>{yc+=p.yellow;rc+=p.red;});
    return {tm, r, squad, yc, rc};
  }
  renderTeamModal(C){
    const h = React.createElement, T = this.T;
    const {tm,r,squad,yc,rc} = this.teamStats(this.state.selectedTeam);
    const close = ()=>this.setState({selectedTeam:null});
    // left-aligned stat: number on one line (never wraps), label justified under it
    const bigStat = (val,label)=>h('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-start',minWidth:0}},
      h('div',{style:{fontSize:32,fontWeight:700,letterSpacing:'-0.02em',lineHeight:1,fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap'}},val),
      h('div',{style:{fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:C.faint,marginTop:6,whiteSpace:'nowrap'}},label));
    const vbar = ()=>h('div',{style:{alignSelf:'flex-start',width:1,height:32,background:C.rule,margin:'1px 18px 0'}});
    const posGroups = ['GK','DEF','MID','ATT'];
    return h('div',{onClick:close,style:{position:'fixed',inset:0,zIndex:90,background:this.rgba('#000',0.5),
      display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'56px 20px',overflowY:'auto',animation:'wcfade .15s'}},
      h('div',{onClick:e=>e.stopPropagation(),style:{width:'min(560px,100%)',background:C.surface,color:C.fg,
        borderRadius:14,boxShadow:'0 30px 80px -20px rgba(0,0,0,0.55)',padding:'30px 32px 36px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:16,marginBottom:26}},
          this.flagToken(C,tm,52,{gold:tm.isWorldCupWinner}),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
              h('div',{style:{fontSize:26,fontWeight:700,letterSpacing:'-0.02em'}}, this.nm(tm)),
              this.wcStars(C, tm, 19)),
            h('div',{style:{fontSize:12,color:C.faint,marginTop:3,letterSpacing:'0.04em'}},
              `${this.state.lang==='es'?'Grupo':'Group'} ${tm.group} · FIFA #${tm.fifaRank}${tm.wcTitles?` · ${tm.wcTitles}× ${this.state.lang==='es'?'Campeón mundial':'World Cup'}`:''}`)),
          h('button',{onClick:close,style:{font:'inherit',fontSize:20,cursor:'pointer',border:'none',background:'transparent',color:C.faint,lineHeight:1}},'×')),
        h('div',{style:{display:'flex',alignItems:'flex-start',flexWrap:'wrap',rowGap:14,padding:'4px 0 22px',borderBottom:`1px solid ${C.rule}`,marginBottom:8}},
          bigStat(r.P,T.played), vbar(),
          bigStat(`${r.W} / ${r.D} / ${r.L}`,T.record), vbar(),
          bigStat((r.GD>0?'+':'')+r.GD,T.gd), vbar(),
          bigStat(`${r.GF} · ${r.GA}`,'GF · GA')),
        h('div',{style:{marginTop:20}},
          posGroups.map((pos,pi)=>{
            const players = squad.players.filter(p=>p.position===pos);
            if(!players.length) return null;
            return h('div',{key:pos,style:{paddingTop:16,marginTop:16,borderTop:pi===0?'none':`1px solid ${this.rgba(C.fg,0.08)}`}},
              h('div',{style:{fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:C.faint,marginBottom:10}},T.pos[pi]),
              players.map((p,i)=>h('div',{key:i,style:{display:'flex',alignItems:'baseline',gap:10,fontSize:13.5,padding:'4px 0'}},
                p.number?h('span',{style:{width:22,color:C.faint2,fontVariantNumeric:'tabular-nums',flex:'0 0 auto',fontSize:12}},p.number):null,
                h('span',null,p.name))));
          }),
          squad.coaches&&squad.coaches.length?h('div',{style:{paddingTop:16,marginTop:16,borderTop:`1px solid ${this.rgba(C.fg,0.08)}`}},
            h('div',{style:{fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:C.faint,marginBottom:10}},T.staff),
            squad.coaches.map((c,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0'}},
              h('span',null,c.name), h('span',{style:{color:C.faint}},c.role)))):null)));
  }

  /* ---------- BEST-3RD POPOUT ---------- */
  renderBest3(C){
    const h = React.createElement, T = this.T, S = this.state;
    const close=()=>this.setState({showBest3:false});
    return h('div',{onClick:close,style:{position:'fixed',inset:0,zIndex:90,background:this.rgba('#000',0.5),
      display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'56px 20px',overflowY:'auto',animation:'wcfade .15s'}},
      h('div',{onClick:e=>e.stopPropagation(),style:{width:'min(520px,100%)',background:C.surface,color:C.fg,
        borderRadius:14,boxShadow:'0 30px 80px -20px rgba(0,0,0,0.55)',padding:'28px 30px 32px'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}},
          h('h3',{style:{margin:0,fontSize:22,fontWeight:700,letterSpacing:'-0.01em'}},T.best3),
          h('button',{onClick:close,style:{font:'inherit',fontSize:20,cursor:'pointer',border:'none',background:'transparent',color:C.faint}},'×')),
        h('div',{style:{fontSize:12.5,color:C.faint,marginBottom:18,maxWidth:'42ch',lineHeight:1.5}},
          this.state.lang==='es'?'Los 8 mejores terceros avanzan a los dieciseisavos.':'The top 8 third-placed teams advance to the Round of 32.'),
        h('div',{style:{display:'grid',gridTemplateColumns:'24px 1fr 30px 36px 30px 26px',gap:8,fontSize:10,
          letterSpacing:'0.1em',textTransform:'uppercase',color:C.faint2,padding:'0 0 9px',borderBottom:`1px solid ${C.rule}`}},
          h('span',null,'#'),h('span',null,'Team'),h('span',{style:{textAlign:'right'}},'Pts'),h('span',{style:{textAlign:'right'}},'GD'),
          h('span',{style:{textAlign:'right'}},'GF'),h('span',{style:{textAlign:'right'}},'Grp')),
        S.thirds.map((t,i)=>{const tm=window.WC.byId[t.row.id];const qual=i<8;
          return h('div',{key:t.row.id,onClick:()=>this.setState({selectedTeam:t.row.id,showBest3:false}),
            style:{display:'grid',gridTemplateColumns:'24px 1fr 30px 36px 30px 26px',gap:8,alignItems:'center',
            fontSize:13.5,padding:'8px 0',cursor:'pointer',opacity:qual?1:0.42,
            borderBottom:`1px solid ${this.rgba(C.fg,0.06)}`,
            borderTop: i===8?`2px solid ${C.rule}`:'none'}},
            h('span',{style:{color:qual?C.accent:C.faint2,fontWeight:qual?600:400,fontVariantNumeric:'tabular-nums'}},i+1),
            h('div',{style:{display:'flex',alignItems:'center',gap:9,minWidth:0}},
              this.flagToken(C,tm,20,{gold:tm.isWorldCupWinner}),
              h('span',{style:{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:qual?600:400}},this.nm(tm)),
              qual?h('span',{style:{color:C.accent,fontSize:12}},'✓'):null),
            h('span',{style:{textAlign:'right',fontWeight:600,fontVariantNumeric:'tabular-nums'}},t.row.Pts),
            h('span',{style:{textAlign:'right',color:C.faint,fontVariantNumeric:'tabular-nums'}},(t.row.GD>0?'+':'')+t.row.GD),
            h('span',{style:{textAlign:'right',color:C.faint,fontVariantNumeric:'tabular-nums'}},t.row.GF),
            h('span',{style:{textAlign:'right',color:C.faint2,fontWeight:600}},t.g));
        })));
  }

  /* ---------- EXPORT ---------- */
  exportPng(){
    const node = document.getElementById('wc-capture');
    if(!node || !window.htmlToImage){ return; }
    const C = this.C();
    window.htmlToImage.toPng(node, {backgroundColor:C.surface, pixelRatio:2, cacheBust:true})
      .then(url=>{ const a=document.createElement('a'); a.download='world-cup-2026-bracket.png'; a.href=url; a.click(); })
      .catch(()=>{});
  }
}
</script>
</body>
</html>
